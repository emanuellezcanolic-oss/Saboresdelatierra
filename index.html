<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabores de la Tierra</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0fdf4; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: white; border-radius: 20px; padding: 40px 32px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(45,106,79,0.15); }
    .logo { font-size: 3rem; margin-bottom: 12px; }
    h1 { font-size: 1.5rem; font-weight: 800; color: #1b4332; }
    p { color: #6c757d; font-size: 0.9rem; margin: 8px 0 28px; }
    .btn { display: block; width: 100%; padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 700; text-decoration: none; margin-bottom: 12px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.88; }
    .btn-admin { background: #2d6a4f; color: white; }
    .btn-info { background: #d8f3dc; color: #2d6a4f; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🌿</div>
    <h1>Sabores de la Tierra</h1>
    <p>Sistema de ventas y control de stock</p>
    <a href="admin.html" class="btn btn-admin">Panel Admin</a>
    <div class="btn btn-info" style="cursor:default">Los puntos de venta acceden<br>por su link personalizado</div>
  </div>
</body>
</html>
